version: 1
frontend:
  phases:
    build:
      commands: []
  artifacts:
    baseDirectory: /
    files:
      - '**/*'
  cache:
    paths: []
  customRules:
    - source: /products
      target: /products.html
      status: '200'
    - source: /team
      target: /team.html
      status: '200'
    - source: /contact
      target: /contact.html
      status: '200'
    - source: </^[^.]+$|\.(?!.*\.)>
      target: /index.html
      status: '200'
