version: 1
frontend:
  phases:
    build:
      commands: []
  artifacts:
    baseDirectory: /
    files:
      - '**/*'
  cache:
    paths: []
  routing:
    - source: '/products'
      target: '/products.html'
      status: '200'
    - source: '</^[^.]+$|\.(?!.*\.)>'
      target: '/index.html'
      status: '200'
